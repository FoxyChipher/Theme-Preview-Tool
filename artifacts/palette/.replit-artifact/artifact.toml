kind = "web"
previewPath = "/"
title = "Theme Preview"
version = "1.0.0"
id = "artifacts/palette"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18097

[services.development]
run = "pnpm --filter @workspace/palette run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/palette", "run", "build" ]
publicDir = "artifacts/palette/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18097"
BASE_PATH = "/"
