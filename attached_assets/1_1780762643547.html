<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Идеальный Инструмент Палитры & Тестирования UI</title>
    <style>
        :root {
            --base-0: #060606; --base-1: #161616; --base-2: #262626;
            --base-3: #363636; --base-4: #464646; --base-5: #565656;
            --base-6: #666666; --base-7: #767676; --base-8: #868686;
            --base-9: #969696; --base-a: #a6a6a6; --base-b: #b6b6b6;
            --base-c: #c6c6c6; --base-d: #d6d6d6; --base-e: #e6e6e6;
            --base-f: #f6f6f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: var(--base-0);
            color: var(--base-d);
            font-family: "FiraCode Nerd Font Mono";
            overflow-x: hidden;
            height: 100vh;
        }
        
        /* Панель управления форматами вверху */
        .control-panel {
            max-width: 960px;
            margin: 20px auto 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .format-btn {
            background: var(--base-1);
            color: var(--base-a);
            border: 1px solid var(--base-3);
            padding: 6px 12px;
            cursor: pointer;
            font-family: "FiraCode Nerd Font Mono";
            font-size: 11px;
            transition: all 0.15s ease;
        }

        .format-btn:hover {
            color: var(--base-f);
            border-color: var(--base-6);
        }

        .format-btn.active {
            background: var(--base-3);
            color: var(--base-f);
            border-color: var(--base-8);
        }

        /* Главная бесконечная сетка */
        .palette {
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 0px; 
            padding: 10px 20px 20px 20px;
        }

        .group-row {
            display: flex;
            gap: 8px;
            align-items: stretch;
            background: var(--base-1);
            padding: 8px;
            border: 1px solid var(--base-2);
            position: relative;
            z-index: 2;
        }

        .swatch {
            flex: 1;
            aspect-ratio: 1 / 1;
            min-width: 45px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            transition: transform 0.1s;
            text-align: center;
            padding: 2px;
        }

        .swatch:hover {
            transform: scale(1.04);
            z-index: 5;
            box-shadow: 0 0 12px rgba(0,0,0,0.5);
        }

        .swatch .color-val {
            font-size: 9px;
            margin-top: 4px;
            opacity: 0.85;
        }

        /* Overlay Карусели */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 3, 3, 0.92);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Контейнер карусели */
        .carousel-container {
            display: flex;
            align-items: center;
            gap: 24px;
            perspective: 1000px;
        }

        /* Большая центральная карточка */
        .carousel-card {
            width: 340px;
            background: #121212;
            border: 1px solid #222;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .card-preview {
            width: 100%;
            height: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            position: relative;
        }

        /* Специфический блок тестирования M-Text */
        .m3-test-block {
            padding: 12px;
            font-size: 12px;
            line-height: 1.5;
            border: 1px dashed rgba(255,255,255,0.1);
            text-align: left;
        }

        .card-meta {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #181818;
            padding: 10px;
            border: 1px solid #262626;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
        }

        .meta-label { color: var(--base-7); }
        .meta-value { color: var(--base-e); cursor: pointer; }
        .meta-value:hover { color: var(--base-f); text-decoration: underline; }

        /* Всплывающее уведомление */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--base-f);
            color: var(--base-0);
            padding: 8px 16px;
            font-size: 12px;
            font-weight: bold;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }
    </style>
</head>
<body>

<div class="control-panel">
    <button class="format-btn active" data-format="hex">HEX</button>
    <button class="format-btn" data-format="rgb">RGB</button>
    <button class="format-btn" data-format="hsl">HSL</button>
</div>

<div class="palette" id="palette-root"></div>

<div class="overlay" id="carousel-overlay">
    <div class="carousel-container">
        <div class="carousel-card" id="carousel-card-node"></div>
    </div>
</div>

<div class="toast" id="toast-node"></div>

<script>
    // Все 36 акцентных цветов
    const allColors = {
        "00": "#f69696", "10": "#f6a696", "20": "#f6b696", "30": "#f6c696", "40": "#f6d696", "50": "#f6e696",
        "60": "#f6f696", "70": "#e6f696", "80": "#d6f696", "90": "#c6f696", "100": "#b6f696", "110": "#a6f696",
        "120": "#96f696", "130": "#96f6a6", "140": "#96f6b6", "150": "#96f6c6", "160": "#96f6d6", "170": "#96f6e6",
        "180": "#96f6f6", "190": "#96e6f6", "200": "#96d6f6", "210": "#96c6f6", "220": "#96b6f6", "230": "#96a6f6",
        "240": "#9696f6", "250": "#a696f6", "260": "#b696f6", "270": "#c696f6", "280": "#d696f6", "290": "#e696f6",
        "300": "#f696f6", "310": "#f696e6", "320": "#f696d6", "330": "#f696c6", "340": "#f696b6", "350": "#f696a6"
    };

    const fullOrder = Object.keys(allColors);
    let currentFormat = 'hex'; // 'hex' | 'rgb' | 'hsl'
    let currentIndex = 0;
    let isCarouselOpen = false;

    // Структура групп для бесшовного зацикливания сетки
    const baseGroups = [
        { prev: ["340","350"], big: "00", next: ["10","20"], bridge: "30" },
        { prev: ["40","50"],  big: "60", next: ["70","80"], bridge: "90" },
        { prev: ["100","110"], big: "120", next: ["130","140"], bridge: "150" },
        { prev: ["160","170"], big: "180", next: ["190","200"], bridge: "210" },
        { prev: ["220","230"], big: "240", next: ["250","260"], bridge: "270" },
        { prev: ["280","290"], big: "300", next: ["310","320"], bridge: "330" }
    ];

    // Функции конвертации и генерации M-Text (#_6_6_6)
    function hexToRgb(hex) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return { r, g, b };
    }

    function rgbToHsl(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;

        if (max === min) {
            h = s = 0;
        } else {
            const d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            switch (max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
            }
            h /= 6;
        }
        return {
            h: Math.round(h * 360),
            s: Math.round(s * 100),
            l: Math.round(l * 100)
        };
    }

    function getPerfectSixesHex(hex) {
        const { r, g, b } = hexToRgb(hex);
        const hsl = rgbToHsl(r, g, b);
        // Принудительно выставляем идеальную яркость 12% для тёмного контрастного текста
        return `hsl(${hsl.h}, ${hsl.s}%, 12%)`;
    }

    function formatColor(hex, format) {
        if (format === 'rgb') {
            const { r, g, b } = hexToRgb(hex);
            return `rgb(${r}, ${g}, ${b})`;
        }
        if (format === 'hsl') {
            const { h, s, l } = rgbToHsl(...Object.values(hexToRgb(hex)));
            return `hsl(${h}, ${s}%, ${l}%)`;
        }
        return hex.toUpperCase();
    }

    // Уведомления
    const toast = document.getElementById("toast-node");
    let toastTimeout;
    function showToast(msg) {
        if (toastTimeout) clearTimeout(toastTimeout);
        toast.textContent = msg;
        toast.style.opacity = "1";
        toastTimeout = setTimeout(() => toast.style.opacity = "0", 1200);
    }

    function copyText(text) {
        navigator.clipboard.writeText(text).then(() => {
            showToast(`Скопировано: ${text}`);
        });
    }

    // Переключение глобального формата отображения цветов
    document.querySelectorAll('.format-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFormat = btn.getAttribute('data-format');
            renderGrid();
            if (isCarouselOpen) renderCarousel();
        });
    });

    // Генерация основной сетки интерфейса
    const paletteRoot = document.getElementById("palette-root");
    function renderGrid() {
        paletteRoot.innerHTML = "";

        baseGroups.forEach((group) => {
            const row = document.createElement("div");
            row.className = "group-row";

            const rowColors = [...group.prev, group.big, ...group.next, group.bridge];

            rowColors.forEach((key) => {
                const hex = allColors[key];
                const item = document.createElement("div");
                item.className = "swatch";
                item.style.backgroundColor = hex;

                const mText = getPerfectSixesHex(hex);
                item.style.color = mText;

                const isBridge = key === group.bridge;
                const isBig = key === group.big;

                if (isBridge) {
                    item.style.border = "1px dashed var(--base-4)";
                }

                item.innerHTML = `
                    <div style="font-weight: ${isBig ? '800' : 'normal'}">"${key}"</div>
                    <div class="color-val">${formatColor(hex, currentFormat)}</div>
                `;

                item.addEventListener("click", (e) => {
                    e.stopPropagation();
                    const globalIndex = fullOrder.indexOf(key);
                    openCarousel(globalIndex);
                });

                row.appendChild(item);
            });

            paletteRoot.appendChild(row);
        });
    }

    // Логика и рендеринг карусели
    const overlay = document.getElementById("carousel-overlay");
    const cardNode = document.getElementById("carousel-card-node");

    function renderCarousel() {
        const key = fullOrder[currentIndex];
        const hex = allColors[key];
        const mText = getPerfectSixesHex(hex);

        const currentValStr = formatColor(hex, currentFormat);
        const mTextValStr = currentFormat === 'hex' ? mText : formatColor(mText, currentFormat);

        cardNode.innerHTML = `
            <div class="card-preview" style="background-color: ${hex}; color: ${mText};">
                <div>"${key}"</div>
                <div style="font-size: 11px; font-weight: normal; margin-top: 4px; opacity:0.8;">
                    ${currentValStr}
                </div>
            </div>

            <div class="m3-test-block" style="background-color: ${hex}; color: ${mText};">
                <strong>Тест M-Text (#_6_6_6):</strong><br>
                !@#$%^&*()_+ фывasd 1234567890<br>
                Сверхвысокий читаемый контраст
            </div>

            <div class="card-meta">
                <div class="meta-row">
                    <span class="meta-label">Режим отображения:</span>
                    <span class="meta-value" style="text-transform: uppercase; font-weight: bold;">${currentFormat}</span>
                </div>
                <div class="meta-row">
                    <span class="meta-label">Accent Color:</span>
                    <span class="meta-value" onclick="copyText('${currentValStr}')">${currentValStr}</span>
                </div>
                <div class="meta-row">
                    <span class="meta-label">Material Text:</span>
                    <span class="meta-value" onclick="copyText('${mTextValStr}')">${mTextValStr}</span>
                </div>
                <div class="meta-row" style="margin-top: 4px; border-top: 1px solid var(--base-2); padding-top: 4px;">
                    <span class="meta-label" style="font-size: 10px;">HEX оригинал:</span>
                    <span class="meta-value" style="font-size: 10px;" onclick="copyText('${hex.toUpperCase()}')">${hex.toUpperCase()}</span>
                </div>
            </div>
        `;
    }

    function openCarousel(index) {
        currentIndex = index;
        isCarouselOpen = true;
        renderCarousel();
        overlay.classList.add("active");
        document.body.style.overflow = "hidden";
    }

    function closeCarousel() {
        isCarouselOpen = false;
        overlay.classList.remove("active");
        document.body.style.overflow = "";
    }

    // Управление событиями мыши и клавиатуры
    overlay.addEventListener("click", (e) => {
        if (e.target === overlay) closeCarousel();
    });

    window.addEventListener("keydown", (e) => {
        if (!isCarouselOpen) return;
        if (e.key === "Escape") closeCarousel();
        if (e.key === "ArrowRight" || e.key === "ArrowDown") {
            currentIndex = (currentIndex + 1) % fullOrder.length;
            renderCarousel();
        }
        if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
            currentIndex = (currentIndex - 1 + fullOrder.length) % fullOrder.length;
            renderCarousel();
        }
    });

    overlay.addEventListener("wheel", (e) => {
        if (!isCarouselOpen) return;
        e.preventDefault();
        if (e.deltaY > 0) {
            currentIndex = (currentIndex + 1) % fullOrder.length;
        } else {
            currentIndex = (currentIndex - 1 + fullOrder.length) % fullOrder.length;
        }
        renderCarousel();
    }, { passive: false });

    // Инициализация при старте страницы
    renderGrid();
</script>
</body>
</html>
